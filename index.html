<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>OpenBird Studio</title>
    <link rel="icon" type="image/png" href="/bird.png" />
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>

    <!-- ===== TOP NAV ===== -->
    <header>
      <div class="header-left">
        <div class="logo">
          <svg class="logo-icon" width="28" height="28" viewBox="0 0 100 100" fill="none">
            <circle cx="50" cy="50" r="46" fill="url(#logoGrad)" />
            <path d="M30 55 Q35 30 55 28 Q70 27 72 40 Q74 50 65 52 L60 53 Q68 58 66 68 Q64 78 50 78 Q36 78 30 65 Z" fill="#0a0a0f"/>
            <circle cx="60" cy="40" r="4" fill="#a78bfa"/>
            <defs>
              <linearGradient id="logoGrad" x1="0" y1="0" x2="100" y2="100">
                <stop offset="0%" stop-color="#a78bfa"/>
                <stop offset="100%" stop-color="#6d28d9"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="logo-text">OpenBird<span class="logo-accent">Studio</span></span>
        </div>
        <button id="model-trigger" class="model-trigger">
          <span class="conn-dot-mini" id="conn-dot-mini"></span>
          <span class="model-name" id="model-name">not connected</span>
          <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div id="model-dropdown" class="model-dropdown">
          <div class="dropdown-section" id="model-list">
            <div class="dropdown-empty">Not connected</div>
          </div>
          <div class="dropdown-divider"></div>
          <div class="dropdown-section dropdown-connection">
            <div class="conn-status" id="conn-status">
              <span class="conn-dot" id="conn-dot"></span>
              <span id="conn-text">Not connected</span>
            </div>
            <div class="conn-url-row">
              <input id="host-input" type="text" placeholder="https://your-ollama-url..." spellcheck="false" />
            </div>
            <div class="conn-actions">
              <button id="connect-btn" class="conn-btn">Connect</button>
            </div>
            <div class="conn-error" id="conn-error" style="display: none"></div>
          </div>
        </div>
      </div>
      <div class="header-right">
        <button id="clear-btn" class="icon-btn" title="New project">
          <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><path d="M9 3.75V14.25M3.75 9H14.25" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </header>

    <!-- ===== MAIN SPLIT PANE ===== -->
    <main id="main">

      <!-- LEFT: Chat Panel -->
      <div id="chat-panel" class="panel">
        <div id="chat">
          <!-- Empty state with templates -->
          <div class="empty-state" id="empty">
            <div class="empty-hero">
              <div class="hero-glow"></div>
              <h1>What do you want to build?</h1>
              <p class="hero-sub">Describe any app, game, or website. OpenBird builds it instantly.</p>
            </div>
            <div class="templates" id="templates">
              <button class="template-card" data-prompt="Build a snake game with neon colors, score tracking, and increasing difficulty. Make it visually stunning with particle effects.">
                <span class="template-icon">&#127918;</span>
                <span class="template-label">Snake Game</span>
                <span class="template-desc">Neon arcade classic</span>
              </button>
              <button class="template-card" data-prompt="Build a beautiful pomodoro timer with ambient sounds, session tracking, a circular progress ring, and dark mode. Include motivational quotes that change each session.">
                <span class="template-icon">&#9202;</span>
                <span class="template-label">Pomodoro Timer</span>
                <span class="template-desc">Focus & productivity</span>
              </button>
              <button class="template-card" data-prompt="Build a personal finance dashboard with interactive charts showing income vs expenses, a budget tracker, recent transactions list, and savings goals with progress bars. Use a clean, modern dark design.">
                <span class="template-icon">&#128200;</span>
                <span class="template-label">Finance Dashboard</span>
                <span class="template-desc">Charts & analytics</span>
              </button>
              <button class="template-card" data-prompt="Build a beautiful weather app that shows current conditions with animated weather icons, 5-day forecast, humidity, wind speed, and a gorgeous gradient background that changes based on weather conditions.">
                <span class="template-icon">&#9925;</span>
                <span class="template-label">Weather App</span>
                <span class="template-desc">Animated & beautiful</span>
              </button>
              <button class="template-card" data-prompt="Build a modern landing page for an AI startup called 'NeuralFlow'. Include a hero section with animated gradient background, features grid, pricing table with 3 tiers, testimonials carousel, and a CTA section. Make it look premium.">
                <span class="template-icon">&#128640;</span>
                <span class="template-label">Landing Page</span>
                <span class="template-desc">Startup-ready design</span>
              </button>
              <button class="template-card" data-prompt="Build a fun interactive quiz game with 10 questions about random trivia. Include a progress bar, score counter, animated transitions between questions, and a results screen with a shareable score card.">
                <span class="template-icon">&#129504;</span>
                <span class="template-label">Quiz Game</span>
                <span class="template-desc">Interactive trivia</span>
              </button>
            </div>
          </div>
        </div>

        <div id="status"></div>

        <div id="input-bar">
          <div class="input-wrap">
            <textarea id="input" rows="1" placeholder="Describe what you want to build..."></textarea>
            <button id="send-btn" title="Send">
              <svg id="send-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <svg id="stop-icon" style="display:none" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
            </button>
          </div>
          <div class="input-hint">Press Enter to send, Shift+Enter for new line</div>
        </div>
      </div>

      <!-- RESIZE HANDLE -->
      <div id="resize-handle" class="resize-handle">
        <div class="resize-line"></div>
      </div>

      <!-- RIGHT: Preview Panel -->
      <div id="preview-panel" class="panel preview-panel">
        <div class="preview-toolbar" id="preview-toolbar">
          <div class="preview-tabs">
            <button class="preview-tab active" id="tab-preview" data-tab="preview">Preview</button>
            <button class="preview-tab" id="tab-code" data-tab="code">Code</button>
          </div>
          <div class="preview-actions">
            <button class="action-btn" id="download-btn" title="Download HTML">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              <span>Download</span>
            </button>
            <button class="action-btn" id="fullscreen-btn" title="Fullscreen">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
            </button>
          </div>
        </div>
        <div class="preview-content" id="preview-content">
          <div class="preview-empty" id="preview-empty">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            <span>Your app will appear here</span>
          </div>
          <iframe id="preview-frame" class="preview-frame" sandbox="allow-scripts" style="display:none"></iframe>
          <div id="code-view" class="code-view" style="display:none">
            <pre><code id="code-content"></code></pre>
          </div>
        </div>
      </div>
    </main>

    <script>
      // ===== DOM refs =====
      const chatEl = document.getElementById("chat");
      const inputEl = document.getElementById("input");
      const sendBtn = document.getElementById("send-btn");
      const sendIcon = document.getElementById("send-icon");
      const stopIcon = document.getElementById("stop-icon");
      const clearBtn = document.getElementById("clear-btn");
      const hostInput = document.getElementById("host-input");
      const connectBtn = document.getElementById("connect-btn");
      const statusEl = document.getElementById("status");
      const modelTrigger = document.getElementById("model-trigger");
      const modelDropdown = document.getElementById("model-dropdown");
      const modelNameEl = document.getElementById("model-name");
      const modelListEl = document.getElementById("model-list");
      const connDot = document.getElementById("conn-dot");
      const connDotMini = document.getElementById("conn-dot-mini");
      const connText = document.getElementById("conn-text");
      const connError = document.getElementById("conn-error");
      const previewFrame = document.getElementById("preview-frame");
      const previewEmpty = document.getElementById("preview-empty");
      const previewToolbar = document.getElementById("preview-toolbar");
      const codeView = document.getElementById("code-view");
      const codeContent = document.getElementById("code-content");
      const tabPreview = document.getElementById("tab-preview");
      const tabCode = document.getElementById("tab-code");
      const downloadBtn = document.getElementById("download-btn");
      const fullscreenBtn = document.getElementById("fullscreen-btn");
      const resizeHandle = document.getElementById("resize-handle");
      const chatPanel = document.getElementById("chat-panel");
      const previewPanel = document.getElementById("preview-panel");

      // ===== State =====
      const savedHost = localStorage.getItem("openbird-host");
      if (savedHost) hostInput.value = savedHost;

      function getHost() {
        return hostInput.value.trim().replace(/\/+$/, "") || undefined;
      }

      let generating = false;
      let conversationHistory = [];
      let currentSessionId = null;
      let currentEventSource = null;
      let currentBody = null;
      let currentRawText = "";
      let currentMetricsEl = null;
      let currentListenResolve = null;
      let models = [];
      let selectedModel = null;
      let connState = "disconnected";
      let lastGeneratedHtml = null;
      let activeTab = "preview";

      // ===== Dropdown toggle =====
      modelTrigger.addEventListener("click", (e) => {
        e.stopPropagation();
        modelDropdown.classList.toggle("open");
      });
      document.addEventListener("click", (e) => {
        if (!modelDropdown.contains(e.target) && !modelTrigger.contains(e.target)) {
          modelDropdown.classList.remove("open");
        }
      });

      // ===== Connection state UI =====
      function setConnState(state, msg) {
        connState = state;
        connDot.className = "conn-dot " + state;
        connDotMini.className = "conn-dot-mini " + state;
        if (state === "disconnected") {
          connText.textContent = msg || "Not connected";
          connectBtn.textContent = "Connect";
          connectBtn.disabled = false;
          connError.style.display = "none";
          modelNameEl.textContent = "not connected";
          modelNameEl.classList.remove("connected");
        } else if (state === "connecting") {
          connText.textContent = "Connecting...";
          connectBtn.textContent = "Connecting...";
          connectBtn.disabled = true;
          connError.style.display = "none";
        } else if (state === "connected") {
          connText.textContent = msg || "Connected";
          connectBtn.textContent = "Reconnect";
          connectBtn.disabled = false;
          connError.style.display = "none";
          modelNameEl.classList.add("connected");
        } else if (state === "error") {
          connText.textContent = "Connection failed";
          connectBtn.textContent = "Try again";
          connectBtn.disabled = false;
          connError.textContent = msg || "Could not reach Ollama.";
          connError.style.display = "block";
          modelNameEl.textContent = "error";
          modelNameEl.classList.remove("connected");
          modelDropdown.classList.add("open");
        }
      }

      function renderModelList() {
        modelListEl.innerHTML = "";
        if (models.length === 0) {
          modelListEl.innerHTML = '<div class="dropdown-empty">No models available</div>';
          return;
        }
        models.forEach((name) => {
          const item = document.createElement("button");
          item.className = "model-item" + (name === selectedModel ? " active" : "");
          item.innerHTML = `<span class="model-item-name">${name}</span>` +
            (name === selectedModel ? '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3.5 8.5L6.5 11.5L12.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' : '');
          item.addEventListener("click", () => {
            selectedModel = name;
            localStorage.setItem("openbird-model", name);
            modelNameEl.textContent = name;
            renderModelList();
            modelDropdown.classList.remove("open");
          });
          modelListEl.appendChild(item);
        });
      }

      // ===== Load models =====
      async function loadModels() {
        setConnState("connecting");
        try {
          const host = getHost();
          if (host) localStorage.setItem("openbird-host", host);
          else localStorage.removeItem("openbird-host");
          const url = host ? `/api/models?host=${encodeURIComponent(host)}` : "/api/models";
          const res = await fetch(url);
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          models = data.models;
          const saved = localStorage.getItem("openbird-model");
          selectedModel = (saved && models.includes(saved)) ? saved : models[0] || null;
          if (selectedModel) {
            modelNameEl.textContent = selectedModel;
            localStorage.setItem("openbird-model", selectedModel);
          }
          renderModelList();
          setConnState("connected", `Connected — ${models.length} model(s)`);
          statusEl.textContent = "";
        } catch (e) {
          models = [];
          renderModelList();
          setConnState("error", e.message || "Could not reach Ollama.");
        }
      }

      // ===== Markdown + math rendering =====
      function renderMd(text) {
        const blocks = [];
        const push = (display, tex) => {
          blocks.push({ display, tex: tex.trim() });
          return `\x00MATH${blocks.length - 1}\x00`;
        };
        let s = text.replace(/\$\$([\s\S]*?)\$\$/g, (_, m) => push(true, m));
        s = s.replace(/\\\[([\s\S]*?)\\\]/g, (_, m) => push(true, m));
        s = s.replace(/\$([^\$\n]+?)\$/g, (_, m) => push(false, m));
        s = s.replace(/\\\((.+?)\\\)/g, (_, m) => push(false, m));
        let html = marked.parse(s);
        html = html.replace(/\x00MATH(\d+)\x00/g, (_, i) => {
          const { display, tex } = blocks[Number(i)];
          try { return katex.renderToString(tex, { displayMode: display, throwOnError: false }); }
          catch { return tex; }
        });
        return html;
      }

      // ===== HTML extraction =====
      function isHtmlCode(text) {
        return /<!doctype\s+html|<html[\s>]/i.test(text);
      }

      function extractHtml(text) {
        const fenceMatch = text.match(/```(?:html)?\s*\n([\s\S]*?)```/);
        if (fenceMatch) return fenceMatch[1].trim();
        if (isHtmlCode(text)) return text.trim();
        return null;
      }

      // ===== Preview panel =====
      function showPreview(html) {
        lastGeneratedHtml = html;
        previewEmpty.style.display = "none";
        previewFrame.style.display = "";
        previewFrame.srcdoc = html;
        codeContent.textContent = html;
        previewToolbar.classList.add("has-content");
        if (activeTab === "code") {
          previewFrame.style.display = "none";
          codeView.style.display = "";
        }
      }

      function clearPreview() {
        lastGeneratedHtml = null;
        previewEmpty.style.display = "";
        previewFrame.style.display = "none";
        previewFrame.srcdoc = "";
        codeView.style.display = "none";
        codeContent.textContent = "";
        previewToolbar.classList.remove("has-content");
        activeTab = "preview";
        tabPreview.classList.add("active");
        tabCode.classList.remove("active");
      }

      // Tab switching
      tabPreview.addEventListener("click", () => {
        activeTab = "preview";
        tabPreview.classList.add("active");
        tabCode.classList.remove("active");
        if (lastGeneratedHtml) {
          previewFrame.style.display = "";
          codeView.style.display = "none";
        }
      });
      tabCode.addEventListener("click", () => {
        activeTab = "code";
        tabCode.classList.add("active");
        tabPreview.classList.remove("active");
        previewFrame.style.display = "none";
        codeView.style.display = "";
      });

      // Download
      downloadBtn.addEventListener("click", () => {
        if (!lastGeneratedHtml) return;
        const blob = new Blob([lastGeneratedHtml], { type: "text/html" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "openbird-app.html";
        a.click();
        URL.revokeObjectURL(a.href);
      });

      // Fullscreen
      let isFullscreen = false;
      fullscreenBtn.addEventListener("click", () => {
        if (!isFullscreen) {
          previewPanel.classList.add("fullscreen");
          document.body.classList.add("has-fullscreen");
          isFullscreen = true;
        } else {
          previewPanel.classList.remove("fullscreen");
          document.body.classList.remove("has-fullscreen");
          isFullscreen = false;
        }
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && isFullscreen) {
          previewPanel.classList.remove("fullscreen");
          document.body.classList.remove("has-fullscreen");
          isFullscreen = false;
        }
      });

      // ===== Resize handle =====
      let isResizing = false;
      resizeHandle.addEventListener("mousedown", (e) => {
        isResizing = true;
        document.body.style.cursor = "col-resize";
        document.body.style.userSelect = "none";
        e.preventDefault();
      });
      document.addEventListener("mousemove", (e) => {
        if (!isResizing) return;
        const mainEl = document.getElementById("main");
        const rect = mainEl.getBoundingClientRect();
        const pct = ((e.clientX - rect.left) / rect.width) * 100;
        const clamped = Math.min(Math.max(pct, 25), 75);
        chatPanel.style.flex = `0 0 ${clamped}%`;
        previewPanel.style.flex = `0 0 ${100 - clamped}%`;
      });
      document.addEventListener("mouseup", () => {
        if (isResizing) {
          isResizing = false;
          document.body.style.cursor = "";
          document.body.style.userSelect = "";
        }
      });

      // ===== Render final result =====
      function renderFinalResult(body, rawText) {
        const html = extractHtml(rawText);
        const msgEl = body.closest(".message");

        if (html) {
          showPreview(html);
          // In chat, show a compact success card
          body.innerHTML = `<div class="build-success">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            <span>App built successfully — see preview</span>
          </div>`;
        } else {
          body.innerHTML = renderMd(rawText);
        }
        chatEl.scrollTop = chatEl.scrollHeight;
      }

      // ===== Chat message rendering =====
      function addMessage(role, text) {
        const empty = document.getElementById("empty");
        if (empty) empty.remove();

        const div = document.createElement("div");
        div.className = `message ${role}`;

        const body = document.createElement("div");
        body.className = role === "assistant" ? "md-body" : "user-body";
        if (role === "user") body.textContent = text;
        div.appendChild(body);

        let metricsEl = null;
        if (role === "assistant") {
          metricsEl = document.createElement("div");
          metricsEl.className = "metrics";
          div.appendChild(metricsEl);
        }

        chatEl.appendChild(div);

        if (role === "assistant" && text) {
          const html = extractHtml(text);
          if (html) {
            showPreview(html);
            body.innerHTML = `<div class="build-success">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              <span>App built successfully — see preview</span>
            </div>`;
          } else {
            body.innerHTML = renderMd(text);
          }
        }

        chatEl.scrollTop = chatEl.scrollHeight;
        return { container: div, body, metricsEl };
      }

      // ===== Send / Stop =====
      function setStopMode(on) {
        if (on) {
          sendIcon.style.display = "none";
          stopIcon.style.display = "";
          sendBtn.classList.add("stop-mode");
        } else {
          sendIcon.style.display = "";
          stopIcon.style.display = "none";
          sendBtn.classList.remove("stop-mode");
        }
      }

      function onSendBtn() {
        if (currentEventSource) { stopChat(); return; }
        send();
      }

      async function send(promptText) {
        const text = promptText || inputEl.value.trim();
        if (!text || generating) return;

        generating = true;
        inputEl.value = "";
        autoResize();

        addMessage("user", text);
        setStopMode(true);
        await startChat(text);
        setStopMode(false);
        generating = false;
        inputEl.focus();
      }

      async function startChat(message) {
        try {
          const host = getHost();
          const body = { model: selectedModel, message, host };
          if (currentSessionId) {
            body.sessionId = currentSessionId;
          } else {
            body.history = [...conversationHistory];
          }

          const res = await fetch("/api/chat/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          const data = await res.json();
          currentSessionId = data.sessionId;
          localStorage.setItem("openbird-session", data.sessionId);

          await listenToChat(data.sessionId);
          await syncHistory(data.sessionId);
        } catch (e) {
          statusEl.textContent = "Error: " + e.message;
        } finally {
          generating = false;
          currentEventSource = null;
        }
      }

      async function syncHistory(sessionId) {
        if (!sessionId) return;
        try {
          const res = await fetch(`/api/chat/${sessionId}/status`);
          if (!res.ok) return;
          const data = await res.json();
          if (data.messages && data.messages.length > 0) {
            conversationHistory = data.messages;
          }
        } catch {}
      }

      function listenToChat(sessionId) {
        return new Promise((resolve) => {
          currentListenResolve = resolve;
          const events = new EventSource(`/api/chat/${sessionId}/events`);
          currentEventSource = events;

          const msg = addMessage("assistant", "");
          const body = msg.body;
          const metricsEl = msg.metricsEl;
          let rawText = "";

          // Show loading state
          body.innerHTML = `<div class="generating-state">
            <div class="gen-spinner"></div>
            <span>Building your app...</span>
          </div>`;

          currentBody = body;
          currentRawText = "";
          currentMetricsEl = metricsEl;

          events.onmessage = (e) => {
            const event = JSON.parse(e.data);
            switch (event.type) {
              case "ai_chunk":
                rawText += event.content;
                currentRawText = rawText;
                break;
              case "ai_done":
                renderFinalResult(body, rawText);
                currentBody = null;
                currentRawText = "";
                if (event.metrics && metricsEl) {
                  const parts = [];
                  const m = event.metrics;
                  if (m.eval_count != null) parts.push(`${m.eval_count} tokens`);
                  if (m.eval_count && m.eval_duration) parts.push(`${(m.eval_count / (m.eval_duration / 1e9)).toFixed(1)} tok/s`);
                  if (m.prompt_eval_count != null) parts.push(`${m.prompt_eval_count} prompt tokens`);
                  if (m.total_duration) parts.push(`${(m.total_duration / 1e9).toFixed(2)}s`);
                  metricsEl.textContent = parts.join(" · ");
                }
                break;
              case "status":
                if (event.status === "done" || event.status === "stopped") {
                  events.close();
                  currentEventSource = null;
                  if (body.querySelector(".generating-state") && rawText) {
                    renderFinalResult(body, rawText);
                    currentBody = null;
                    currentRawText = "";
                  } else if (body.querySelector(".generating-state")) {
                    body.innerHTML = '<div class="stopped-msg">Stopped</div>';
                  }
                  statusEl.textContent = "";
                  resolve();
                }
                break;
              case "error":
                events.close();
                currentEventSource = null;
                body.innerHTML = `<div class="error-msg">${event.message}</div>`;
                currentBody = null;
                currentRawText = "";
                resolve();
                break;
            }
          };

          events.onerror = () => {
            events.close();
            currentEventSource = null;
            currentBody = null;
            currentRawText = "";
            resolve();
          };
        });
      }

      function stopChat() {
        if (currentSessionId) {
          fetch(`/api/chat/${currentSessionId}/stop`, { method: "POST" });
        }
        if (currentEventSource) {
          currentEventSource.close();
          currentEventSource = null;
        }
        if (currentBody && currentRawText) {
          renderFinalResult(currentBody, currentRawText);
        } else if (currentBody) {
          currentBody.innerHTML = '<div class="stopped-msg">Stopped</div>';
        }
        currentBody = null;
        currentRawText = "";
        if (currentMetricsEl) currentMetricsEl.textContent = "Stopped";
        currentMetricsEl = null;
        if (currentListenResolve) { currentListenResolve(); currentListenResolve = null; }
      }

      // ===== Auto-resize textarea =====
      function autoResize() {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px";
      }

      // ===== Template cards =====
      document.getElementById("templates").addEventListener("click", (e) => {
        const card = e.target.closest(".template-card");
        if (!card) return;
        const prompt = card.dataset.prompt;
        if (prompt) send(prompt);
      });

      // ===== Events =====
      sendBtn.addEventListener("click", onSendBtn);
      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); onSendBtn(); }
      });
      inputEl.addEventListener("input", autoResize);
      clearBtn.addEventListener("click", () => {
        chatEl.innerHTML = "";
        // Re-add empty state
        chatEl.innerHTML = `<div class="empty-state" id="empty">
          <div class="empty-hero">
            <div class="hero-glow"></div>
            <h1>What do you want to build?</h1>
            <p class="hero-sub">Describe any app, game, or website. OpenBird builds it instantly.</p>
          </div>
          <div class="templates" id="templates">
            <button class="template-card" data-prompt="Build a snake game with neon colors, score tracking, and increasing difficulty. Make it visually stunning with particle effects.">
              <span class="template-icon">&#127918;</span>
              <span class="template-label">Snake Game</span>
              <span class="template-desc">Neon arcade classic</span>
            </button>
            <button class="template-card" data-prompt="Build a beautiful pomodoro timer with ambient sounds, session tracking, a circular progress ring, and dark mode. Include motivational quotes that change each session.">
              <span class="template-icon">&#9202;</span>
              <span class="template-label">Pomodoro Timer</span>
              <span class="template-desc">Focus & productivity</span>
            </button>
            <button class="template-card" data-prompt="Build a personal finance dashboard with interactive charts showing income vs expenses, a budget tracker, recent transactions list, and savings goals with progress bars. Use a clean, modern dark design.">
              <span class="template-icon">&#128200;</span>
              <span class="template-label">Finance Dashboard</span>
              <span class="template-desc">Charts & analytics</span>
            </button>
            <button class="template-card" data-prompt="Build a beautiful weather app that shows current conditions with animated weather icons, 5-day forecast, humidity, wind speed, and a gorgeous gradient background that changes based on weather conditions.">
              <span class="template-icon">&#9925;</span>
              <span class="template-label">Weather App</span>
              <span class="template-desc">Animated & beautiful</span>
            </button>
            <button class="template-card" data-prompt="Build a modern landing page for an AI startup called 'NeuralFlow'. Include a hero section with animated gradient background, features grid, pricing table with 3 tiers, testimonials carousel, and a CTA section. Make it look premium.">
              <span class="template-icon">&#128640;</span>
              <span class="template-label">Landing Page</span>
              <span class="template-desc">Startup-ready design</span>
            </button>
            <button class="template-card" data-prompt="Build a fun interactive quiz game with 10 questions about random trivia. Include a progress bar, score counter, animated transitions between questions, and a results screen with a shareable score card.">
              <span class="template-icon">&#129504;</span>
              <span class="template-label">Quiz Game</span>
              <span class="template-desc">Interactive trivia</span>
            </button>
          </div>
        </div>`;
        // Rebind template clicks
        document.getElementById("templates").addEventListener("click", (e) => {
          const card = e.target.closest(".template-card");
          if (card && card.dataset.prompt) send(card.dataset.prompt);
        });
        statusEl.textContent = "";
        conversationHistory = [];
        currentSessionId = null;
        localStorage.removeItem("openbird-session");
        clearPreview();
      });

      connectBtn.addEventListener("click", () => loadModels());
      hostInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") { e.preventDefault(); loadModels(); }
      });

      // ===== Init =====
      loadModels();
      inputEl.focus();

      // Reconnect to active session
      (async function reconnect() {
        const savedSession = localStorage.getItem("openbird-session");
        if (!savedSession) return;
        try {
          const res = await fetch(`/api/chat/${savedSession}/status`);
          if (!res.ok) { localStorage.removeItem("openbird-session"); return; }
          const data = await res.json();
          if (data.status === "running") {
            currentSessionId = savedSession;
            generating = true;
            setStopMode(true);
            for (const msg of data.messages) {
              addMessage(msg.role === "assistant" ? "assistant" : "user", msg.content);
            }
            await listenToChat(savedSession);
            setStopMode(false);
            generating = false;
          } else {
            localStorage.removeItem("openbird-session");
          }
        } catch { localStorage.removeItem("openbird-session"); }
      })();
    </script>
  </body>
</html>
